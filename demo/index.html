<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flora — Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #4f6df5;
    }

    header span {
      font-size: 13px;
      color: #94a3b8;
    }

    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .editor-pane {
      width: 40%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #e2e8f0;
      background: white;
    }

    .editor-pane .toolbar {
      padding: 12px 16px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .editor-pane .toolbar label {
      font-size: 13px;
      font-weight: 500;
      color: #64748b;
    }

    button {
      padding: 6px 16px;
      background: #4f6df5;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #3b5de7; }

    select {
      padding: 6px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #1e293b;
      background: white;
      cursor: pointer;
      outline: none;
    }

    select:focus { border-color: #4f6df5; }

    textarea {
      flex: 1;
      padding: 16px;
      border: none;
      outline: none;
      resize: none;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 14px;
      line-height: 1.6;
      color: #1e293b;
      background: white;
      tab-size: 2;
    }

    .preview-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .preview-pane .toolbar {
      padding: 12px 16px;
      border-bottom: 1px solid #e2e8f0;
      background: white;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .preview-pane .toolbar label {
      font-size: 13px;
      font-weight: 500;
      color: #64748b;
    }

    #output {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #f8fafc;
    }

    #output svg {
      max-width: 100%;
      max-height: 100%;
    }

    .error {
      padding: 16px;
      color: #dc2626;
      font-family: monospace;
      font-size: 13px;
      white-space: pre-wrap;
    }

    #node-info {
      font-size: 12px;
      color: #64748b;
      min-width: 120px;
      text-align: right;
    }
  </style>
</head>
<body>
  <header>
    <h1>Flora</h1>
    <span>Beautiful, interactive diagrams</span>
  </header>

  <div class="container">
    <div class="editor-pane">
      <div class="toolbar">
        <label>Input</label>
        <button id="render-btn">Render</button>
      </div>
      <textarea id="input" spellcheck="false">flowchart TD
  subgraph Frontend
    UI[User Interface] --> API[API Client]
  end
  subgraph Backend
    Server[Express Server] --> Auth[Auth Service]
    Server --> DB[(Database)]
    subgraph Workers
      Queue[Job Queue] --> Worker1[Worker]
      Queue --> Worker2[Worker 2]
    end
    Server --> Queue
  end
  API --> Server
  UI --> CDN([CDN])</textarea>
    </div>

    <div class="preview-pane">
      <div class="toolbar">
        <label>Preview</label>
        <select id="theme-select">
          <option value="default">Default</option>
          <option value="tufte">Tufte</option>
          <option value="digital">Digital</option>
        </select>
        <span id="node-info"></span>
      </div>
      <div id="output"></div>
    </div>
  </div>

  <script type="module">
    import { render } from "../dist/index.js";

    const input = document.getElementById("input");
    const output = document.getElementById("output");
    const renderBtn = document.getElementById("render-btn");
    const nodeInfo = document.getElementById("node-info");
    const themeSelect = document.getElementById("theme-select");

    function renderDiagram() {
      try {
        output.innerHTML = "";
        const { warnings } = render(input.value, output, {
          theme: themeSelect.value,
          interactive: true,
          onNodeHover: (id) => {
            nodeInfo.textContent = id ? `Node: ${id}` : "";
          },
          onNodeClick: (id) => {
            nodeInfo.textContent = `Clicked: ${id}`;
          },
        });
        if (warnings.length > 0) {
          const warningEl = document.createElement("div");
          warningEl.className = "error";
          warningEl.style.color = "#d97706";
          warningEl.textContent = warnings.map(w => `Line ${w.line}: ${w.message}`).join("\n");
          output.appendChild(warningEl);
        }
      } catch (err) {
        output.innerHTML = `<div class="error">${err.message}</div>`;
      }
    }

    renderBtn.addEventListener("click", renderDiagram);
    themeSelect.addEventListener("change", renderDiagram);

    input.addEventListener("keydown", (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
        e.preventDefault();
        renderDiagram();
      }
    });

    renderDiagram();
  </script>
</body>
</html>
